<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="dayGLANCE - A beautiful time-blocking day planner with task management">

  <!-- Promote the native iOS app to PWA/web visitors on iOS (Safari smart banner) -->
  <meta name="apple-itunes-app" content="app-id=6771540599">

  <!-- Open Graph / social sharing -->
  <meta property="og:title" content="dayGLANCE: your day, at a glance">
  <meta property="og:description" content="A privacy-first day planner with visual time-blocking for tasks, habits, goals, and calendar events. Free, no account required.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dayglance.app">
  <meta property="og:image" content="https://dayglance.app/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="dayGLANCE — your day, at a glance">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="dayGLANCE: your day, at a glance">
  <meta name="twitter:description" content="A privacy-first day planner with visual time-blocking for tasks, habits, goals, and calendar events. Free, no account required.">
  <meta name="twitter:image" content="https://dayglance.app/og-card.png">

  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="light dark">
  <script src="/theme-init.js"></script>

  <!-- Preload the wordmark font (Lora) so it's ready at first paint and the
       fallback italic never flashes before it (pairs with font-display: block). -->
  <link rel="preload" href="/fonts/lora-500-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/lora-700-italic-latin.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png">

  <!-- Apple -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="dayGLANCE">

  <title>dayGLANCE</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
