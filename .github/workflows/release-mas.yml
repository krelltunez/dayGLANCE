name: Build Mac App Store Package

# Produces a signed .pkg ready for Transporter / App Store Connect upload.
# Run manually (workflow_dispatch) or on a mas-v* tag so it never collides with
# the Developer ID DMG/ZIP pipeline in release-desktop.yml.
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'CFBundleVersion (must increase per App Store upload)'
        required: false
        default: ''
  push:
    tags:
      - 'mas-v*'

jobs:
  build-mas:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Decode provisioning profile
        run: |
          if [ -z "$MAC_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::MAC_PROVISIONING_PROFILE_BASE64 secret is required for MAS builds"
            exit 1
          fi
          echo "$MAC_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/dayglance.provisionprofile"
          echo "MAC_PROVISIONING_PROFILE=$RUNNER_TEMP/dayglance.provisionprofile" >> "$GITHUB_ENV"
        env:
          MAC_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}

      - name: Build MAS package
        run: npm run build:electron:mas
        env:
          # "3rd Party Mac Developer Application" / "Apple Distribution" cert (signs the .app)
          CSC_LINK: ${{ secrets.MAS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAS_CSC_KEY_PASSWORD }}
          # "3rd Party Mac Developer Installer" / "Mac Installer Distribution" cert (signs the .pkg)
          CSC_INSTALLER_LINK: ${{ secrets.MAS_CSC_INSTALLER_LINK }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.MAS_CSC_INSTALLER_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_PROVISIONING_PROFILE: ${{ env.MAC_PROVISIONING_PROFILE }}
          # CFBundleVersion: manual input wins; otherwise the run number keeps it increasing.
          BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dayglance-mas-pkg
          path: dist-app/*.pkg
          if-no-files-found: error
